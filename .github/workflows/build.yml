name: Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  prepare_assets:
    name: Prepare Species Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install species-bundle dependencies
        run: pip install -r tools/requirements-species-bundle.txt

      - name: Download BirdNET taxonomy export
        run: python tools/download_taxonomy_json.py

      - name: Build species bundle assets
        run: python tools/build_species_bundle.py

      - name: Upload prepared species assets
        uses: actions/upload-artifact@v4
        with:
          name: prepared-species-assets
          path: |
            assets/species_data/
            assets/species_images/
            assets/models/taxonomy.csv
          if-no-files-found: error

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: prepare_assets
    steps:
      - uses: actions/checkout@v4

      - name: Download prepared species assets
        uses: actions/download-artifact@v4
        with:
          name: prepared-species-assets
          path: prepared-assets

      - name: Restore prepared assets into workspace
        shell: bash
        run: |
          rm -rf assets/species_data assets/species_images
          mkdir -p assets/models
          cp -R prepared-assets/assets/species_data assets/species_data
          cp -R prepared-assets/assets/species_images assets/species_images
          cp prepared-assets/assets/models/taxonomy.csv assets/models/taxonomy.csv

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_STORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create Android key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_STORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Resolve app version metadata
        shell: bash
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          PUBSPEC_VERSION_NAME=${PUBSPEC_VERSION%%+*}
          PUBSPEC_BUILD_NUMBER=${PUBSPEC_VERSION#*+}

          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.tag_name }}" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            APP_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            APP_BUILD_NUMBER="${BASH_REMATCH[3]}"
          else
            APP_VERSION="$PUBSPEC_VERSION_NAME"
            if [[ "$PUBSPEC_VERSION" == *+* ]]; then
              APP_BUILD_NUMBER="$PUBSPEC_BUILD_NUMBER"
            else
              APP_BUILD_NUMBER="${PUBSPEC_VERSION_NAME##*.}"
            fi
          fi

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Build release APK
        run: flutter build apk --release --build-name=${{ env.APP_VERSION }} --build-number=${{ env.APP_BUILD_NUMBER }}

      - name: Rename APK with version
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/BirdNET_Live_v${{ env.APP_VERSION }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/BirdNET_Live_v${{ env.APP_VERSION }}.apk
          if-no-files-found: error

      - name: Clean up Android signing files
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties android/app/upload-keystore.jks

  build_ios:
    name: Build iOS App (No Codesign)
    runs-on: macos-latest
    needs: prepare_assets
    steps:
      - uses: actions/checkout@v4

      - name: Download prepared species assets
        uses: actions/download-artifact@v4
        with:
          name: prepared-species-assets
          path: prepared-assets

      - name: Restore prepared assets into workspace
        shell: bash
        run: |
          rm -rf assets/species_data assets/species_images
          mkdir -p assets/models
          cp -R prepared-assets/assets/species_data assets/species_data
          cp -R prepared-assets/assets/species_images assets/species_images
          cp prepared-assets/assets/models/taxonomy.csv assets/models/taxonomy.csv

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Resolve app version metadata
        shell: bash
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          PUBSPEC_VERSION_NAME=${PUBSPEC_VERSION%%+*}
          PUBSPEC_BUILD_NUMBER=${PUBSPEC_VERSION#*+}

          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.tag_name }}" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            APP_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            APP_BUILD_NUMBER="${BASH_REMATCH[3]}"
          else
            APP_VERSION="$PUBSPEC_VERSION_NAME"
            if [[ "$PUBSPEC_VERSION" == *+* ]]; then
              APP_BUILD_NUMBER="$PUBSPEC_BUILD_NUMBER"
            else
              APP_BUILD_NUMBER="${PUBSPEC_VERSION_NAME##*.}"
            fi
          fi

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Build iOS app (no code signing)
        run: flutter build ios --release --no-codesign --build-name=${{ env.APP_VERSION }} --build-number=${{ env.APP_BUILD_NUMBER }}

      - name: Archive Runner.app
        shell: bash
        run: |
          cd build/ios/iphoneos
          zip -r Runner.app.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphoneos/Runner.app.zip
          if-no-files-found: error


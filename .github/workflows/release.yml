name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
jobs:
  prepare_source:
    name: Prepare Source Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure Git LFS files are materialized
        run: git lfs pull

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: repo-source
          path: .
          include-hidden-files: true

  build_android:
    name: Test And Build Android APK
    runs-on: ubuntu-latest
    needs: prepare_source
    steps:
      - name: Download source snapshot
        uses: actions/download-artifact@v4
        with:
          name: repo-source
          path: .

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version

      - name: Prepare generated asset directories
        run: mkdir -p assets/species_data

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install species-bundle dependencies
        run: pip install -r tools/requirements-species-bundle.txt

      - name: Download BirdNET taxonomy export
        run: python tools/download_taxonomy_json.py

      - name: Build species bundle assets
        run: python tools/build_species_bundle.py

      - name: Check signing secrets availability
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_STORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "HAVE_SIGNING_SECRETS=true" >> "$GITHUB_ENV"
          else
            echo "HAVE_SIGNING_SECRETS=false" >> "$GITHUB_ENV"
          fi

      - name: Decode Android keystore
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create Android key.properties
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        shell: bash
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Resolve app version metadata
        shell: bash
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          PUBSPEC_VERSION_NAME=${PUBSPEC_VERSION%%+*}
          PUBSPEC_BUILD_NUMBER=${PUBSPEC_VERSION#*+}

          echo "APP_VERSION=$PUBSPEC_VERSION_NAME" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=$PUBSPEC_BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK with version
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/BirdNET_Live_v${{ env.APP_VERSION }}.apk

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/BirdNET_Live_v${{ env.APP_VERSION }}.apk

      - name: Clean up Android signing files
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties android/app/upload-keystore.jks

  build_windows:
    name: Build Windows Release Artifacts
    runs-on: windows-latest
    needs: prepare_source
    steps:
      - name: Download source snapshot
        uses: actions/download-artifact@v4
        with:
          name: repo-source
          path: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install species-bundle dependencies
        run: python -m pip install -r tools/requirements-species-bundle.txt

      - name: Download BirdNET taxonomy export
        run: python tools/download_taxonomy_json.py

      - name: Build species bundle assets
        run: python tools/build_species_bundle.py

      - name: Resolve app version metadata
        shell: pwsh
        run: |
          $pubspecVersion = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches[0].Groups[1].Value.Trim()
          $appVersion = $pubspecVersion.Split('+')[0]
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows release and Inno Setup installer
        shell: pwsh
        run: |
          .\dev\build_inno_installer.ps1

      - name: Zip Windows release folder
        shell: pwsh
        run: |
          $releaseDir = 'build/windows/x64/runner/Release'
          $zipPath = "build/windows/x64/runner/BirdNET_Live_v${{ env.APP_VERSION }}_windows_x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $releaseDir -DestinationPath $zipPath

      - name: Attach Windows artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/BirdNET_Live_v${{ env.APP_VERSION }}_windows_x64.zip
            build/windows/x64/runner/BirdNET_Live_v${{ env.APP_VERSION }}_windows_x64_setup.exe

  publish_winget:
    needs:
      - build_windows
    runs-on: windows-latest
    steps:
      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: BirdNETTeam.BirdNETLive
          installers-regex: 'windows_x64_setup.exe'
          token: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}

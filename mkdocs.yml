site_name: BirdNET Live
site_description: Real-time bird species identification using on-device ONNX inference
site_url: https://birdnet-team.github.io/birdnet-live-app
repo_url: https://github.com/birdnet-team/birdnet-live-app
repo_name: birdnet-live-app

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    - scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user/getting-started.md
      - Live Mode: user/live-mode.md
      - Explore: user/explore.md
      - Session Library: user/session-library.md
      - Session Review: user/session-review.md
      - Settings: user/settings.md
      - Export & Sync: user/export-sync.md
      - Survey Mode: user/survey-mode.md
      - Point Count Mode: user/point-count-mode.md
      - File Analysis: user/file-analysis.md
      - FAQ: user/faq.md
      - Troubleshooting: user/troubleshooting.md
  - Developer Guide:
      - Overview: developer/index.md
      - Getting Started: developer/getting-started.md
      - Architecture: developer/architecture.md
      - Building: developer/building.md
      - Testing: developer/testing.md
      - Code Style: developer/code-style.md
      - Species Bundle: developer/species-bundle.md
      - State Management: developer/state-management.md
      - Audio Pipeline: developer/audio-pipeline.md
      - Inference Engine: developer/inference-engine.md
      - Spectrogram: developer/spectrogram.md
      - Localization: developer/localization.md
      - Storage: developer/database.md
      - API Integration: developer/api-integration.md
      - Releasing: developer/releasing.md
  - API Reference:
      - Taxonomy & Sync API: api/sync-api.md
  - Privacy Policy: privacy.md
  - Terms of Use: terms.md

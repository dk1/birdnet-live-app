site_name: BirdNET Live
site_description: Real-time bird species identification using on-device ONNX 
  inference
site_url: https://birdnet-team.github.io/birdnet-live-app
repo_url: https://github.com/birdnet-team/birdnet-live-app
repo_name: birdnet-live-app

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
  - scheme: slate
    primary: blue
    accent: amber
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  - scheme: default
    primary: blue
    accent: amber
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy

markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- attr_list
- md_in_html
- tables
- toc:
    permalink: true

plugins:
- search

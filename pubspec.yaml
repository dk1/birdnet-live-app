name: birdnet_live
description: "Real-time bird species identification using on-device ONNX inference"
publish_to: 'none'
version: 0.15.7+165

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^12.0.1

  # Audio
  record: 6.1.2
  fftea: ^1.2.0
  # Spoken detection announcements (TTS + audio session routing)
  flutter_tts: ^4.2.0
  audio_session: ^0.2.3
  # Inference
  flutter_onnxruntime: ^1.7.0

  # UI & UX
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1

  # Export
  archive: ^4.0.2
  crypto: ^3.0.3

  # Localization
  intl: any
  just_audio: ^0.10.5
  just_audio_windows: ^0.2.3

  # Background service
  flutter_foreground_task: ^9.2.2
  battery_plus: ^7.0.0

  # Notifications (heads-up species alerts during surveys)
  flutter_local_notifications: ^21.0.0

  # Location
  geolocator: ^14.0.2

  # Map
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Icons
  material_symbols_icons: ^4.2928.1

  # Dynamic theming
  dynamic_color: ^1.7.0

  # Network & Images
  http: ^1.2.2
  path: ^1.9.0
  file_picker: ^11.0.2
  flutter_map_marker_cluster: ^8.2.2
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/models/
    - assets/species_images/
    - assets/species_data/
    - assets/announcements/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app-icon.png"
  adaptive_icon_background: "assets/images/app-icon-background.png"
  adaptive_icon_foreground: "assets/images/app-icon-foreground.png"

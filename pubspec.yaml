name: birdnet_live
description: "Real-time bird species identification using on-device ONNX inference"
publish_to: 'none'
version: 0.2.7+36

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # Audio
  record: ^6.2.0
  fftea: ^1.2.0

  # Inference
  onnxruntime: ^1.4.1

  # UI & UX
  introduction_screen: ^3.1.14
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.1.3

  # Export
  archive: ^4.0.2

  # Localization
  intl: any
  just_audio: ^0.10.5

  # Background service
  flutter_foreground_task: ^8.17.0
  battery_plus: ^6.0.3

  # Location
  geolocator: ^13.0.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Icons
  material_design_icons_flutter: ^7.0.7296

  # Network & Images
  http: ^1.2.2
  cached_network_image: ^3.4.1
  path: ^1.9.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app-icon.png"
  adaptive_icon_background: "assets/images/app-icon-background.png"
  adaptive_icon_foreground: "assets/images/app-icon-foreground.png"
